<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #04070d; color: #f1f3fb; font-family: "Inter", system-ui, sans-serif; min-height: 100vh; }
  * { box-sizing: border-box; }
  #root { position: fixed; inset: 0; }
  /* Keyframes used by AuroraLayout / DirectionDeepSea */
  @keyframes aFloat1 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-46%,-54%) scale(1.08)} }
  @keyframes aFloat2 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-54%,-46%) scale(1.12)} }
  @keyframes aFloat3 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-47%,-53%) scale(1.06)} }
  @keyframes aFloat4 { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-53%,-47%) scale(1.1)} }
  @keyframes aPulse  { 0%{transform:translate(-50%,-50%) scale(0.2);opacity:0.7} 100%{transform:translate(-50%,-50%) scale(1.4);opacity:0} }
  @keyframes tdot    { 0%,100%{opacity:0.3;transform:translateY(0)} 50%{opacity:1;transform:translateY(-3px)} }
</style>
